<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LianTech.Group — Infrastructure &amp; IT Solutions</title>
<style>
@font-face{
  font-family:'BigBlue';
  src:url('BigBlueTerminalPlus.ttf') format('truetype');
  font-display:swap;
}

:root{
  --bg:          #0b0f14;
  --text:        #d7dadc;
  --text-dim:    #6b7680;
  --accent:      #7fbf5a;
  --accent-glow: rgba(127,191,90,0.65);
  --accent-soft: rgba(127,191,90,0.30);
  --accent-faint:rgba(127,191,90,0.15);
  --font-mono:   'BigBlue', 'Courier New', monospace;
}

*{ box-sizing:border-box; margin:0; padding:0; }

html, body{ height:100%; overflow:hidden; overscroll-behavior:none; }

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-mono);
  font-size:19px;
  line-height:1.6;
  text-align:left;
}

::selection{ background:var(--accent); color:#0b0f14; }

/* ---------- header ---------- */
#header{
  position:fixed; top:0; left:0; right:0; z-index:70;
  padding:26px 8vw 0;
  background:linear-gradient(180deg, rgba(11,15,20,0.98) 60%, rgba(11,15,20,0));
}
#header .brand{
  color:var(--accent);
  font-size:clamp(30px,4.6vw,44px);
  letter-spacing:1px;
  text-shadow:0 0 10px var(--accent-glow), 0 0 22px var(--accent-faint);
}
#header .rule{ color:var(--text-dim); margin-top:10px; font-size:15px; letter-spacing:1px; overflow:hidden; white-space:nowrap; }

/* ---------- boot loader ---------- */
#boot-loader{
  position:fixed; inset:0; z-index:100;
  display:flex; flex-direction:column; justify-content:center;
  padding:0 8vw;
  background:var(--bg);
  transition:opacity .4s ease;
  text-align:left;
}
#boot-loader .term-line{ font-size:19px; }
#boot-loader .bar{ color:var(--accent); margin-top:6px; }

/* ---------- stage (single active section) ---------- */
#terminal-viewport{
  position:fixed; top:0; left:0; right:0; bottom:0;
  padding:150px 11vw 90px 8vw;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  z-index:1;
  display:flex; align-items:center;
}
#section-stage{ margin-right:100px; width:100%; text-align:left; }

.term-line{ white-space:pre-wrap; word-break:break-word; font-size:19px; text-align:left; }
.prompt-tag{ color:var(--accent); }
.output{ color:var(--text-dim); margin-top:8px; font-size:17px; text-align:left; }

.cursor{
  display:inline-block; width:0.5em; height:1em;
  background:var(--accent); vertical-align:middle; margin-left:3px;
  box-shadow:0 0 8px var(--accent-glow);
  animation:blink 1s steps(1) infinite;
}
@keyframes blink{ 50%{opacity:0;} }
@media(prefers-reduced-motion:reduce){ .cursor{ animation:none; } }

.section-row{ display:flex; align-items:flex-start; justify-content:flex-start; gap:36px; margin-top:18px; width:100%; }
.section-text{ flex:1 1 auto; min-width:0; max-width:600px; text-align:left; }

.ascii-icon{
  flex:0 0 260px;
  color:var(--accent);
  font-family:var(--font-mono);
  white-space:pre;
  font-size:15px;
  line-height:1.3;
  opacity:0;
  transition:opacity .6s ease;
  text-shadow:0 0 8px var(--accent-faint);
  text-align:left;
  margin-left:auto;
  margin-right:auto;
  margin-top:auto;
  margin-bottom:auto;
}
.ascii-icon.show{ opacity:1; }

@media(max-width:860px){
  #header{ padding:20px 6vw 0; }
  #terminal-viewport{ padding:112px 6vw 66px 6vw; align-items:flex-start; }
  body{ font-size:16px; }
  .term-line{ font-size:16px; }
  .output{ font-size:14px; }
  .section-row{ flex-direction:column; align-items:flex-start; gap:18px; margin-top:14px; }
  .section-text{ max-width:100%; }
  .ascii-icon{ font-size:11px; }
  .title{ font-size:clamp(28px,9vw,40px) !important; }
  .body-text{ font-size:15px !important; }
}

.title{
  color:var(--accent);
  font-size:clamp(28px,4vw,42px);
  line-height:1.05;
  letter-spacing:1px;
  text-shadow:0 0 10px var(--accent-glow), 0 0 26px var(--accent-faint);
  margin-top:14px;
  text-align:left;
}

.body-text{ margin-top:14px; color:var(--text); font-size:18px; max-width:600px; text-align:left; }

/* ---------- services checklist ---------- */
.svc-item{
  opacity:0; transform:translateX(-6px);
  transition:opacity .35s ease, transform .35s ease;
  padding:3px 0; font-size:18px; text-align:left;
}
.svc-item.show{ opacity:1; transform:translateX(0); }
.svc-item .check{ color:var(--accent); margin-right:10px; }

/* ---------- projects ---------- */
.proj-grid{ margin-top:16px; display:flex; flex-direction:column; gap:14px; }
.proj{
  border:1px solid var(--accent-faint); padding:14px 16px;
  opacity:0; transform:translateY(8px); transition:opacity .4s ease, transform .4s ease;
  text-align:left;
}
.proj.show{ opacity:1; transform:translateY(0); }
.proj .name{ color:var(--accent); font-size:17px; }
.proj .meta{ color:var(--text-dim); font-size:12px; margin-top:2px; }
.proj .desc{ margin-top:6px; font-size:15px; }

/* ---------- team ---------- */
.team-grid{ margin-top:16px; display:flex; flex-direction:column; gap:2px; }
.team-row{
  display:flex; gap:18px; padding:8px 0; border-bottom:1px solid var(--accent-faint);
  opacity:0; transform:translateY(6px); transition:opacity .35s ease, transform .35s ease;
  font-size:17px; text-align:left;
}
.team-row.show{ opacity:1; transform:translateY(0); }
.team-row .role{ color:var(--text-dim); width:150px; flex-shrink:0; font-size:14px; }

/* ---------- contact ---------- */
.cfg-form{ margin-top:16px; display:flex; flex-direction:column; gap:14px; max-width:440px; width:100%; }
.cfg-field label{ display:block; color:var(--text-dim); font-size:13px; margin-bottom:4px; text-align:left; }
.cfg-field label::before{ content:'! '; color:var(--accent); }
.cfg-field input, .cfg-field textarea{
  width:100%; background:transparent; border:none; border-bottom:1px solid var(--accent-soft);
  color:var(--text); font-family:var(--font-mono); font-size:16px; padding:6px 2px;
}
.cfg-field input:focus, .cfg-field textarea:focus{ outline:none; border-bottom-color:var(--accent); }
.cfg-field textarea{ resize:vertical; min-height:60px; }
.cfg-submit{
  all:unset; cursor:pointer; color:var(--accent); border:1px solid var(--accent-soft);
  padding:8px 18px; width:fit-content; font-family:var(--font-mono); font-size:16px;
}
.cfg-submit:hover, .cfg-submit:focus-visible{ background:var(--accent); color:#0b0f14; outline:none; }
.cfg-status{ color:var(--text-dim); font-size:14px; min-height:1.4em; text-align:left; }

/* ---------- scroll hint ---------- */
#scroll-hint{
  position:fixed; bottom:22px; left:8vw; z-index:70;
  color:var(--text-dim); font-size:12px; letter-spacing:2px; opacity:0;
  transition:opacity .6s ease;
  animation:hint-bob 2.2s ease-in-out infinite;
  pointer-events:none;
}
@keyframes hint-bob{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(5px); } }
@media(max-width:860px){ #scroll-hint{ left:6vw; bottom:16px; } }

/* ---------- rail ---------- */
#rail{
  position:fixed; top:50%; right:5vw; transform:translateY(-50%);
  z-index:70; display:flex; flex-direction:column; align-items:flex-end; gap:0;
}
.rail-cap{ color:var(--text-dim); font-size:10px; letter-spacing:2px; padding:6px 0; }
.rail-item{
  display:flex; align-items:center; gap:10px; padding:10px 0; cursor:pointer;
  background:none; border:none; font-family:var(--font-mono);
}
.rail-item .dot{
  width:7px; height:7px; border-radius:50%;
  border:1px solid var(--text-dim); background:transparent;
  transition:all .3s ease; flex-shrink:0;
}
.rail-item .label{
  color:var(--text-dim); font-size:12px; letter-spacing:1px; white-space:nowrap;
  transition:color .3s ease;
}
.rail-item.active .dot{ background:var(--accent); border-color:var(--accent); box-shadow:0 0 8px var(--accent-glow); width:9px; height:9px; }
.rail-item.active .label{ color:var(--accent); text-shadow:0 0 6px var(--accent-faint); }
.rail-line{ position:absolute; right:3px; top:14px; bottom:14px; width:1px; background:var(--text-dim); opacity:0.3; z-index:-1; }

@media(max-width:860px){
  #rail{ right:4vw; }
  .rail-cap{ display:none; }
  .rail-item .label{ display:none; }
  .rail-item{ padding:7px 0; }
}

a{ color:var(--accent); }
::-webkit-scrollbar{ width:0; height:0; }
</style>
</head>
<body>

<div id="header">
  <div class="brand">LianTech.Group</div>
  <div class="rule">----------------------------------------------------------------------</div>
</div>

<div id="boot-loader">
  <div id="boot-lines"></div>
</div>

<div id="terminal-viewport">
  <div id="section-stage"></div>
</div>

<div id="scroll-hint">▾ SCROLL ▾</div>

<div id="rail">
  <div class="rail-line"></div>
  <div class="rail-cap">TOP</div>
  <div class="rail-item" data-idx="0"><span class="label">01 ABOUT</span><span class="dot"></span></div>
  <div class="rail-item" data-idx="1"><span class="label">02 SERVICES</span><span class="dot"></span></div>
  <div class="rail-item" data-idx="2"><span class="label">03 PROJECTS</span><span class="dot"></span></div>
  <div class="rail-item" data-idx="3"><span class="label">04 TEAM</span><span class="dot"></span></div>
  <div class="rail-item" data-idx="4"><span class="label">05 CONTACT</span><span class="dot"></span></div>
  <div class="rail-cap">END</div>
</div>

<script>
(function(){
  const REDUCE = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const stage = document.getElementById('section-stage');
  const scrollHint = document.getElementById('scroll-hint');
  const railItems = Array.from(document.querySelectorAll('.rail-item'));
  const viewport = document.getElementById('terminal-viewport');

  function sleep(ms){ return new Promise(function(res){ setTimeout(res, ms); }); }

  /* ---------------- typewriter helpers (Promise-based) ---------------- */
  function typeText(el, text, speed){
    return new Promise(function(resolve){
      if(REDUCE){ el.textContent = text; resolve(); return; }
      let i = 0;
      (function step(){
        if(i <= text.length){ el.textContent = text.slice(0,i); i++; setTimeout(step, speed); }
        else resolve();
      })();
    });
  }

  function eraseText(el, speed){
    return new Promise(function(resolve){
      if(REDUCE){ el.textContent=''; resolve(); return; }
      let text = el.textContent;
      (function step(){
        if(text.length > 0){ text = text.slice(0,-1); el.textContent = text; setTimeout(step, speed); }
        else resolve();
      })();
    });
  }

  function fadeOut(el, dur){
    return new Promise(function(resolve){
      if(REDUCE){ el.style.opacity = 0; resolve(); return; }
      el.style.transition = 'opacity ' + dur + 'ms ease';
      requestAnimationFrame(function(){ el.style.opacity = 0; });
      setTimeout(resolve, dur);
    });
  }

  /* ==================================================================
     BOOT SEQUENCE
     ================================================================== */
  const bootLoader = document.getElementById('boot-loader');
  const bootLines = document.getElementById('boot-lines');

  function addLine(container, cls){
    const el = document.createElement('div');
    el.className = cls || 'term-line';
    container.appendChild(el);
    return el;
  }

  async function runLoadingBar(){
    const l1 = addLine(bootLines);
    await typeText(l1, 'Initializing...', 18);
    const l2 = addLine(bootLines, 'term-line bar');
    const stages = ['[■□□□□□□□□□] 10%','[■■□□□□□□□□] 20%','[■■■■□□□□□□] 40%','[■■■■■□□□□□] 50%','[■■■■■■■□□□] 70%','[■■■■■■■■□□] 80%','[■■■■■■■■■■] 100%'];
    for(let i=0;i<stages.length;i++){
      l2.textContent = stages[i];
      await sleep(90);
    }
    await sleep(150);
  }

  async function runBootLines(){
    const script = [
      'Router> enable',
      'Password: ********',
      'Router#',
      'Router# terminal length 0',
      'Router#',
      'Router# show version',
      '__OUT__System  : LianTech Core OS\nUptime  : 684 days\nStatus  : Stable',
      'Router#',
      'Router# connect liantech-core',
      '__OUT__Connecting... OK',
      'Router#'
    ];
    for(let i=0;i<script.length;i++){
      const raw = script[i];
      if(raw.startsWith('__OUT__')){
        const out = addLine(bootLines, 'output');
        out.style.fontSize = '17px';
        out.innerHTML = raw.replace('__OUT__','').split('\n').join('<br>');
        await sleep(140);
        continue;
      }
      const line = document.createElement('div');
      line.className = 'term-line';
      bootLines.appendChild(line);
      await typeText(line, raw, 20);
      if(i === script.length - 1){
        const cur = document.createElement('span');
        cur.className = 'cursor';
        line.appendChild(cur);
      }
      await sleep(110);
    }
    await sleep(250);
  }

  /* ==================================================================
     ASCII-CHARACTER ICONS (per section)
     ================================================================== */
  const icons = {
    about:
"                       _______\n" +
"                      |- - - -|\n" +
"                      |- - - -|\n" +
"             _______  |- - - -|\n" +
"            |- - - -| |- - - -|  _______\n" +
"            |- - - -| |- - - -| |- - - -|\n" +
"            |- - - -| |- - - -| |- - - -|\n" +
"            |_ - - _| |_ - - _| |_ - - _|\n" +
"  ----------|-------|-|-------|-|-------|----------",
    services:
"                      .-''''-.\n" +
"                   .-(        )-.\n" +
"                 .'   .          '.\n" +
"                (    (             )\n" +
"                 '-.__'._________.'\n" +
"                          |\n" +
"                          |\n" +
"          .---------------+---------------.\n" +
"          |               |               |\n" +
"      .---+---.       .---+---.       .---+---.\n" +
"      |       |       |       |       |       |\n" +
"      |_______|       |_______|       |_______|\n" +
"        _|_|_           _|_|_           _|_|_",
    projects:
"     .------------------------------------.\n" +
"     |  .------------------------------.  |\n" +
"     |  |                              |  |\n" +
"     |  | > code_                      |  |\n" +
"     |  |   ................           |  |\n" +
"     |  |   ...............            |  |\n" +
"     |  |   .................          |  |\n" +
"     |  |                              |  |\n" +
"     |  '------------------------------'  |\n" +
"     '------------------------------------'\n" +
"    /            ______________            \\\n" +
"   /                                        \\\n" +
"  (__________________________________________)",
    team:
"                    .-'''-.\n" +
"       .-''-.      /       \\      .-''-.\n" +
"      /      \\    |-[_] [_]-|    /      \\\n" +
"     (        )   (         )   (        )\n" +
"      \\      /     \\       /     \\      /\n" +
"       )    (       )     (       )    (\n" +
"   .-''      ''-.-''       ''-.-''      ''-.\n" +
"  /            /               \\            \\",
    contact:
"     .------------------------------.\n" +
"     | '.                        .' |\n" +
"     |   '.                    .'   |\n" +
"     |     '.                .'     |\n" +
"     |       '.            .'       |\n" +
"     |       .''.        .''.       |\n" +
"     |     .'    '-....-'    '.     |\n" +
"     |   .'                    '.   |\n" +
"     | .'                        '. |\n" +
"     '------------------------------'"
  };

  function buildIcon(key){
    const pre = document.createElement('pre');
    pre.className = 'ascii-icon';
    pre.textContent = icons[key];
    return pre;
  }

  /* ==================================================================
     SECTION DEFINITIONS
     ================================================================== */
  const sections = [
    { key:'about', cmd:'show about', title:'ABOUT US', icon:'about' },
    { key:'services', cmd:'show services', title:'SERVICES', icon:'services' },
    { key:'projects', cmd:'show projects', title:'PROJECTS', icon:'projects' },
    { key:'team', cmd:'show team', title:'TEAM', icon:'team' },
    { key:'contact', cmd:'show contact', title:'CONTACT', icon:'contact' }
  ];

  let currentIndex = -1;
  let transitioning = false;
  let activeElements = []; // { el, type: 'text'|'block' }

  function trackText(el){ activeElements.push({ el:el, type:'text' }); return el; }
  function trackBlock(el){ activeElements.push({ el:el, type:'block' }); return el; }

  function updateRail(idx){
    railItems.forEach(function(item){
      item.classList.toggle('active', parseInt(item.dataset.idx,10) === idx);
    });
  }

  async function eraseCurrentSection(){
    for(let i = activeElements.length - 1; i >= 0; i--){
      const item = activeElements[i];
      if(item.type === 'text'){
        await eraseText(item.el, 4);
      } else {
        await fadeOut(item.el, 150);
      }
      item.el.remove();
    }
    activeElements = [];
    stage.innerHTML = '';
  }

  /* ---------------- shared command+title header ---------------- */
  async function baseTitledCommand(textWrap, cmd, titleText){
    const cmdLine = document.createElement('div');
    cmdLine.className = 'term-line';
    textWrap.appendChild(cmdLine);
    const prefix = document.createElement('span');
    prefix.className = 'prompt-tag'; prefix.textContent = 'Router# ';
    const cmdSpan = document.createElement('span');
    cmdLine.appendChild(prefix); cmdLine.appendChild(cmdSpan);
    trackText(cmdSpan);
    await typeText(cmdSpan, cmd, 20);

    const title = document.createElement('div');
    title.className = 'title'; title.textContent = titleText;
    title.style.opacity = 0;
    textWrap.appendChild(title); trackBlock(title);
    requestAnimationFrame(function(){ title.style.transition='opacity .4s ease'; title.style.opacity = 1; });
    await sleep(REDUCE?0:150);
  }

  /* ---------------- section renderers ---------------- */
  async function renderAbout(row, textWrap){
    await baseTitledCommand(textWrap, 'show about', 'ABOUT US');
    const out = document.createElement('div');
    out.className = 'output';
    textWrap.appendChild(out); trackBlock(out);
    out.style.opacity = 0;
    out.innerHTML = 'Loading...<br>Company : LianTech Group<br>Field&nbsp;&nbsp;&nbsp;: Infrastructure &amp; IT Solutions<br>Status&nbsp;&nbsp;: Online';
    requestAnimationFrame(function(){ out.style.transition='opacity .5s ease'; out.style.opacity = 1; });
  }

  async function renderServices(row, textWrap){
    await baseTitledCommand(textWrap, 'show services', 'SERVICES');
    const list = document.createElement('div');
    list.style.marginTop = '14px';
    textWrap.appendChild(list); trackBlock(list);
    const items = ['Network Infrastructure','Virtualization','Cyber Security','Backup Solutions','Cloud Services','Monitoring'];
    for(let i=0;i<items.length;i++){
      const row2 = document.createElement('div');
      row2.className = 'svc-item';
      row2.innerHTML = '<span class="check">✔</span>' + items[i];
      list.appendChild(row2);
      requestAnimationFrame(function(){ row2.classList.add('show'); });
      await sleep(70);
    }
  }

  async function renderProjects(row, textWrap){
    await baseTitledCommand(textWrap, 'show projects', 'PROJECTS');
    const intro = document.createElement('div');
    intro.className = 'body-text';
    intro.textContent = 'We have worked on a wide range of projects for startups, enterprises and organizations across different industries.';
    textWrap.appendChild(intro); trackBlock(intro);

    const grid = document.createElement('div');
    grid.className = 'proj-grid';
    textWrap.appendChild(grid); trackBlock(grid);
    const projects = [
      ['Core Network Refresh','Status: Deployed','Full spine-leaf redesign for a multi-site manufacturing client, cutting east-west latency by 40%.'],
      ['Zero-Trust Rollout','Status: In Progress','Phased migration from perimeter-based security to identity-aware access across 300+ endpoints.'],
      ['DR & Backup Overhaul','Status: Deployed','3-2-1 backup architecture with automated failover, tested to a 15-minute RTO.']
    ];
    for(let i=0;i<projects.length;i++){
      const p = projects[i];
      const card = document.createElement('div');
      card.className = 'proj';
      card.innerHTML = '<div class="name">'+p[0]+'</div><div class="meta">'+p[1]+'</div><div class="desc">'+p[2]+'</div>';
      grid.appendChild(card);
      requestAnimationFrame(function(){ card.classList.add('show'); });
      await sleep(90);
    }
  }

  async function renderTeam(row, textWrap){
    await baseTitledCommand(textWrap, 'show team', 'TEAM');
    const intro = document.createElement('div');
    intro.className = 'body-text';
    intro.textContent = 'A group of passionate IT professionals with diverse skills and strong experience.';
    textWrap.appendChild(intro); trackBlock(intro);

    const grid = document.createElement('div');
    grid.className = 'team-grid';
    textWrap.appendChild(grid); trackBlock(grid);
    const team = [
      ['Manager','Majid Nemati'],
      ['Staff','Matin Javaheri'],
      ['Staff','Hossein Najafi'],
      ['Staff','Mohsen Mohsenpour']
    ];
    for(let i=0;i<team.length;i++){
      const t = team[i];
      const r = document.createElement('div');
      r.className = 'team-row';
      r.innerHTML = '<div class="role">'+t[0]+'</div><div class="who">'+t[1]+'</div>';
      grid.appendChild(r);
      requestAnimationFrame(function(){ r.classList.add('show'); });
      await sleep(70);
    }
  }

  async function renderContact(row, textWrap){
    await baseTitledCommand(textWrap, 'show contact', 'CONTACT');
    const intro = document.createElement('div');
    intro.className = 'body-text';
    intro.textContent = "Let's build something great together. Get in touch with us.";
    textWrap.appendChild(intro); trackBlock(intro);

    const form = document.createElement('form');
    form.className = 'cfg-form';
    form.innerHTML =
      '<div class="cfg-field"><label>hostname</label><input name="name" type="text" placeholder="your name" required></div>' +
      '<div class="cfg-field"><label>ip address</label><input name="email" type="email" placeholder="your@email.com" required></div>' +
      '<div class="cfg-field"><label>description</label><textarea name="message" placeholder="tell us about the project" required></textarea></div>' +
      '<button type="submit" class="cfg-submit">wr mem</button>' +
      '<div class="cfg-status"></div>';
    textWrap.appendChild(form); trackBlock(form);

    form.addEventListener('submit', function(e){
      e.preventDefault();
      const name = form.querySelector('[name=name]').value;
      const email = form.querySelector('[name=email]').value;
      const msg = form.querySelector('[name=message]').value;
      const status = form.querySelector('.cfg-status');
      typeText(status, 'Building configuration...', 15).then(function(){
        return sleep(250);
      }).then(function(){
        return typeText(status, '[OK] Configuration applied. Opening mail client...', 12);
      }).then(function(){
        const subject = encodeURIComponent('New inquiry from ' + name);
        const body = encodeURIComponent(msg + '\n\n— ' + name + ' (' + email + ')');
        window.location.href = 'mailto:hello@liantech.group?subject=' + subject + '&body=' + body;
      });
    });
  }

  const renderers = { about:renderAbout, services:renderServices, projects:renderProjects, team:renderTeam, contact:renderContact };

  async function showSection(idx){
    currentIndex = idx;
    updateRail(idx);
    const def = sections[idx];
    const row = document.createElement('div');
    row.className = 'section-row';
    stage.appendChild(row);

    const textWrap = document.createElement('div');
    textWrap.className = 'section-text';
    row.appendChild(textWrap);

    const iconWrap = buildIcon(def.icon);
    row.appendChild(iconWrap);
    trackBlock(iconWrap);
    setTimeout(function(){ iconWrap.classList.add('show'); }, 150);

    await renderers[def.key](row, textWrap);
    scrollHint.style.opacity = (idx < sections.length - 1) ? 0.6 : 0;
  }

  async function goToSection(idx){
    if(transitioning) return;
    if(idx < 0 || idx >= sections.length) return;
    if(idx === currentIndex) return;
    transitioning = true;
    scrollHint.style.opacity = 0;
    await eraseCurrentSection();
    await showSection(idx);
    transitioning = false;
  }

  railItems.forEach(function(item){
    item.addEventListener('click', function(){
      goToSection(parseInt(item.dataset.idx,10));
    });
  });

  /* ==================================================================
     INPUT: wheel / touch / keyboard
     ================================================================== */
  let wheelAccum = 0;
  window.addEventListener('wheel', function(e){
    if(viewport.scrollHeight > viewport.clientHeight + 4) return; // allow native scroll if content overflows
    e.preventDefault();
    if(transitioning || currentIndex < 0) return;
    wheelAccum += e.deltaY;
    if(wheelAccum > 40){ wheelAccum = 0; goToSection(currentIndex + 1); }
    else if(wheelAccum < -40){ wheelAccum = 0; goToSection(currentIndex - 1); }
  }, { passive:false });

  let touchStartY = null;
  window.addEventListener('touchstart', function(e){ touchStartY = e.touches[0].clientY; }, { passive:true });
  window.addEventListener('touchmove', function(e){
    if(viewport.scrollHeight > viewport.clientHeight + 4) return; // allow native internal scroll
    e.preventDefault();
  }, { passive:false });
  window.addEventListener('touchend', function(e){
    if(touchStartY === null || transitioning || currentIndex < 0) return;
    if(viewport.scrollHeight > viewport.clientHeight + 4){ touchStartY = null; return; }
    const dy = touchStartY - e.changedTouches[0].clientY;
    if(dy > 40) goToSection(currentIndex + 1);
    else if(dy < -40) goToSection(currentIndex - 1);
    touchStartY = null;
  }, { passive:true });

  window.addEventListener('keydown', function(e){
    if(transitioning || currentIndex < 0) return;
    if(['ArrowDown','PageDown',' '].includes(e.key)){ e.preventDefault(); goToSection(currentIndex + 1); }
    if(['ArrowUp','PageUp'].includes(e.key)){ e.preventDefault(); goToSection(currentIndex - 1); }
  });

  /* ==================================================================
     BOOT ORCHESTRATION
     ================================================================== */
  (async function boot(){
    await runLoadingBar();
    await fadeOut(bootLines, 250);
    bootLines.innerHTML = '';
    bootLines.style.opacity = 1;
    await runBootLines();
    await fadeOut(bootLoader, 350);
    bootLoader.style.display = 'none';
    await showSection(0);
  })();

})();
</script>

</body>
</html>
